<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Functions & Scope Example</title>
</head>
<body>

<h1>Functions & Scope</h1>

<script>
    function addValues(x, y) {
        return x + y;
    }
    console.log(addValues(4, 5));

    function calculateSquare(value) {
        return value * value;
    }
    console.log(calculateSquare(6));

    function findMax(first, second) {
        return first > second ? first : second;
    }
    console.log(findMax(7, 3));
</script>

</body>
</html>
