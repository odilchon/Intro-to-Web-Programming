<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flexbox Labs Combined</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

section {
    margin: 40px 20px;
}

h2 {
    margin-bottom: 15px;
}

/*LAB 1*/

.lab1-container {
    display: flex;
    background-color: lightgray;
    padding: 10px;
}

.lab1-box {
    width: 100px;
    height: 100px;
    background-color: steelblue;
    margin: 5px;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 18px;
}

/* LAB 2 */

.lab2-container {
    display: flex;
    flex-direction: row;
    justify-content: space-around;
    align-items: center;
    height: 300px;
    background-color: lightgray;
}

.lab2-box {
    width: 100px;
    height: 100px;
    background-color: crimson;
    margin: 5px;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 18px;
}

/* LAB 3 */

.lab3-container {
    display: flex;
    flex-wrap: wrap;
    background-color: lightgray;
    padding: 10px;
}

.lab3-box {
    width: 150px;
    height: 100px;
    background-color: royalblue;
    margin: 5px;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 18px;
    flex-grow: 1;
}

/* LAB 4 */

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    background-color: #333;
    padding: 15px;
}

.navbar a {
    color: white;
    text-decoration: none;
    padding: 10px 20px;
    flex-grow: 1;
    text-align: center;
}

.navbar a:hover {
    background-color: gray;
}

</style>
</head>

<body>

<!--LAB 1 -->

<section>
<h2>Lab 1: Basic display: flex</h2>
<div class="lab1-container">
    <div class="lab1-box">1</div>
    <div class="lab1-box">2</div>
    <div class="lab1-box">3</div>
</div>
</section>

<!-- LAB 2 -->

<section>
<h2>Lab 2: Flex Direction & Alignment</h2>
<div class="lab2-container">
    <div class="lab2-box">A</div>
    <div class="lab2-box">B</div>
    <div class="lab2-box">C</div>
</div>
</section>

<!-- LAB 3 -->

<section>
<h2>Lab 3: flex-wrap & flex-grow</h2>
<div class="lab3-container">
    <div class="lab3-box">1</div>
    <div class="lab3-box">2</div>
    <div class="lab3-box">3</div>
    <div class="lab3-box">4</div>
    <div class="lab3-box">5</div>
</div>
</section>

<!-- LAB 4 -->

<section>
<h2>Lab 4: Adaptive Navigation Menu</h2>
<nav class="navbar">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
</nav>
</section>

</body>
</html>
