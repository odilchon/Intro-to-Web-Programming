<!-- Lab 1: Background Image -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Background Image</title>
    <style>
        .background-box {
            width: 400px;
            height: 200px;
            background-image: url("your-image.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            border: 2px solid black;
            text-align: center;
            line-height: 200px;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="background-box">
        This box has a background image.
    </div>

</body>
</html>

<!-- Lab 2: Gradients -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gradients in CSS</title>
    <style>
        .linear-gradient-box {
            width: 300px;
            height: 150px;
            background: linear-gradient(to right, red, blue);
            text-align: center;
            line-height: 150px;
            color: white;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .radial-gradient-box {
            width: 300px;
            height: 150px;
            background: radial-gradient(circle, yellow, green);
            text-align: center;
            line-height: 150px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="linear-gradient-box">Linear Gradient</div>
    <div class="radial-gradient-box">Radial Gradient</div>

</body>
</html>

<!-- Lab 3: Borders and Border Radius -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Borders in CSS</title>
    <style>
        .solid-border {
            width: 200px;
            height: 100px;
            border: 3px solid black;
            text-align: center;
            line-height: 100px;
            margin-bottom: 20px;
        }

        .dashed-border {
            width: 200px;
            height: 100px;
            border: 3px dashed red;
            text-align: center;
            line-height: 100px;
            margin-bottom: 20px;
        }

        .rounded-border {
            width: 200px;
            height: 100px;
            border: 3px solid blue;
            border-radius: 20px;
            text-align: center;
            line-height: 100px;
        }
    </style>
</head>
<body>

    <div class="solid-border">Solid Border</div>
    <div class="dashed-border">Dashed Border</div>
    <div class="rounded-border">Rounded Border</div>

</body>
</html>
