<!DOCTYPE html>
<html lang="en">
<head>
    <title>Click Interaction</title>
</head>
<body>

<button onclick="handleClick()">Press Me</button>
<p id="textArea">Waiting for action...</p>

<script>
    function handleClick() {
        document.getElementById("textArea").innerText = "Button was pressed!";
    }
</script>

</body>
</html>
