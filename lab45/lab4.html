<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Filter</title>
<style>
body { font-family:Verdana; background:#f0f2f5; text-align:center; }
input { padding:10px; width:300px; margin:20px 0; }
ul { list-style:none; padding:0; }
li { background:#fff; margin:6px auto; padding:10px; width:300px; border-radius:6px; }
</style>
</head>
<body>

<h2>Find User</h2>
<input type="text" id="searchInput" placeholder="Type a name...">
<ul id="listBox"></ul>

<script>
let allUsers = [];
const searchInput = document.getElementById("searchInput");
const listBox = document.getElementById("listBox");

async function getUsers() {
    const response = await fetch("https://jsonplaceholder.typicode.com/users");
    allUsers = await response.json();
    renderList(allUsers);
}

function renderList(arr) {
    listBox.innerHTML = "";
    arr.forEach(u => {
        const li = document.createElement("li");
        li.textContent = `${u.name} (${u.email})`;
        listBox.appendChild(li);
    });
}

searchInput.addEventListener("input", () => {
    const value = searchInput.value.toLowerCase();
    const filtered = allUsers.filter(u =>
        u.name.toLowerCase().includes(value)
    );
    renderList(filtered);
});

getUsers();
</script>

</body>
</html>
