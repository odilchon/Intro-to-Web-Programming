<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Joke Loader</title>
<style>
body { text-align:center; font-family:Verdana; margin-top:40px; }
button { padding:10px 15px; background:#2e8b57; color:#fff; border:none; border-radius:6px; cursor:pointer; }
.box { margin-top:20px; background:#fff; padding:20px; display:inline-block; border-radius:8px; }
</style>
</head>
<body>

<h2>Need a Joke?</h2>
<button id="jokeBtn">Load Joke</button>

<div class="box">
    <p id="jokeArea">Press the button...</p>
</div>

<script>
const jokeBtn = document.getElementById("jokeBtn");
const jokeArea = document.getElementById("jokeArea");

jokeBtn.addEventListener("click", async () => {
    try {
        const response = await fetch("https://official-joke-api.appspot.com/random_joke");
        const joke = await response.json();
        jokeArea.textContent = `${joke.setup} — ${joke.punchline}`;
    } catch (error) {
        jokeArea.textContent = "Failed to load joke.";
    }
});
</script>

</body>
</html>
