<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Articles</title>
<style>
body { font-family: Verdana; background:#eef2f7; padding:20px; }
.wrapper { display:flex; flex-direction:column; gap:15px; }
.card {
    background:#fff;
    padding:15px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
.title { font-weight:bold; margin-bottom:8px; }
.text { color:#555; font-size:14px; }
</style>
</head>
<body>

<h2>Latest Articles</h2>
<div id="postsWrapper" class="wrapper"></div>

<script>
async function fetchPosts() {
    try {
        const response = await fetch("https://jsonplaceholder.typicode.com/posts");
        const posts = await response.json();

        const container = document.getElementById("postsWrapper");

        posts.slice(0,5).forEach(entry => {
            const card = document.createElement("div");
            card.classList.add("card");

            const heading = document.createElement("div");
            heading.classList.add("title");
            heading.textContent = entry.title;

            const content = document.createElement("div");
            content.classList.add("text");
            content.textContent = entry.body;

            card.appendChild(heading);
            card.appendChild(content);
            container.appendChild(card);
        });

    } catch(error) {
        console.error("Post loading error:", error);
    }
}

fetchPosts();
</script>

</body>
</html>
