<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nature Gallery</title>
    <link rel="stylesheet" href="viewer.css">
</head>
<body>

<h1>Nature Image Gallery</h1>

<div class="photo-wrapper" id="photoWrapper"></div>

<div class="popup" id="popup">
    <span class="exit" id="exitBtn">&times;</span>
    <img id="popupImage" class="popup-img">

    <button class="control next-btn" id="next">&#10095;</button>
</div>


<script src="viewer.js"></script>
</body>
</html>
