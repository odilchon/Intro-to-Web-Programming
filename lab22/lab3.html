<!-- Lab 3: Merged Cells -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Merged Cells Table</title>
</head>
<body>

<h2>Project Schedule</h2>

<table border="1">
    <tr>
        <th colspan="3">Development Plan</th>
    </tr>
    <tr>
        <th>Day</th>
        <th>Time</th>
        <th>Task</th>
    </tr>
    <tr>
        <td rowspan="2">Wednesday</td>
        <td>09:00 AM</td>
        <td>Code Review</td>
    </tr>
    <tr>
        <td>03:00 PM</td>
        <td>Feature Implementation</td>
    </tr>
    <tr>
        <td>Thursday</td>
        <td>11:00 AM</td>
        <td>Testing</td>
    </tr>
</table>

</body>
</html>
