<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multimedia Page</title>
</head>
<body>

<h1>Complete Multimedia Page</h1>

<h2>Image Section</h2>
<img src="nature-view.jpg"
     alt="Green forest and river landscape"
     width="500">

<h2>Audio Section</h2>
<audio controls>
    <source src="background.mp3" type="audio/mpeg">

    <source src="demo-video.mp4" type="video/mp4">
    Your browser does not support video playback.
</video>

</body>
</html>
