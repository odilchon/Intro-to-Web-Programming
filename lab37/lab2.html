<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lab 2: Using slice()</title>
    <script>
        window.onload = function() {

            let numberList = [10, 20, 30, 40, 50];

            let selectedSection = numberList.slice(1, 3);

            console.log("Selected section:", selectedSection);
            console.log("Initial array:", numberList);
        };
    </script>
</head>
<body>
    <h1>Open Console to see results</h1>
</body>
</html>
