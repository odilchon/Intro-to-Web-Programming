<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lab 3: Using map()</title>
    <script>
        window.onload = function() {

            let values = [1, 2, 3, 4, 5];

            let squaredValues = values.map(item => item * item);

            console.log("Initial values:", values);
            console.log("Squared values:", squaredValues);
        };
    </script>
</head>
<body>
    <h1>Open Console to see results</h1>
</body>
</html>
