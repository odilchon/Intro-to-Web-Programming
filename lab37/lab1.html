<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lab 1: Working with push & pop</title>
    <script>
        window.onload = function() {

            let foodList = [];

            foodList.push("Apple");
            foodList.push("Banana");
            foodList.push("Cherry");

            let lastItem = foodList.pop();

            console.log("Current array:", foodList);
            console.log("Removed item:", lastItem);
        };
    </script>
</head>
<body>
    <h1>Open Console to see results</h1>
</body>
</html>
