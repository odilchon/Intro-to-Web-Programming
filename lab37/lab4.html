<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lab 4: Using filter()</title>
    <script>
        window.onload = function() {

            let ageList = [12, 18, 25, 30, 15];

            let adultsOnly = ageList.filter(value => value >= 18);

            console.log("Adults:", adultsOnly);
        };
    </script>
</head>
<body>
    <h1>Open Console to see results</h1>
</body>
</html>
