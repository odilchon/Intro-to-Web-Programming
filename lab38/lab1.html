<!DOCTYPE html>

<body>
<script>
function convertJSON(text) {
    try {
        let result = JSON.parse(text);
        console.log(result);
    } catch (err) {
        console.error("Incorrect JSON format");
    }
}

convertJSON('{"name": "Alice", "age": 25}');
convertJSON('{name: Alice, age: 25}');
</script>
</body>
