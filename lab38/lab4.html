<!DOCTYPE html>

<body>
<script>
function calculateDivision(x, y) {
    try {
        if (y === 0) {
            throw new Error("Cannot divide by zero");
        }
        console.log(x / y);
    } catch (err) {
        console.error(err.message);
    }
}

calculateDivision(10, 2);
calculateDivision(5, 0);
</script>
</body>
</html>
