<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab 2 - Expanding Button</title>

<style>
.btn {
    background-color: green;
    color: white;
    padding: 12px 25px;
    border: none;
    cursor: pointer;
    transition: transform 0.3s ease-in-out;
}

.btn:hover {
    transform: scale(1.2);
}
</style>
</head>

<body>
<h2>Lab 2: Expanding Button</h2>
<button class="btn">Hover Me</button>
</body>
</html>
