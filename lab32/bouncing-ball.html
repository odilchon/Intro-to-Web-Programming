<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab 4 - Bouncing Ball</title>

<style>
body {
    height: 300px;
    position: relative;
}

.ball {
    width: 50px;
    height: 50px;
    background-color: red;
    border-radius: 50%;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    animation: bounce 1s infinite alternate ease-in-out;
}

@keyframes bounce {
    from { top: 0; }
    to { top: 200px; }
}
</style>
</head>

<body>
<h2>Lab 4: Bouncing Ball</h2>
<div class="ball"></div>
</body>
</html>
