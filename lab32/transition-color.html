<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab 1 - Smooth Color Transition</title>

<style>
.btn {
    background-color: blue;
    color: white;
    padding: 12px 25px;
    border: none;
    cursor: pointer;
    transition: background-color 0.5s ease-in-out;
}

.btn:hover {
    background-color: red;
}
</style>
</head>

<body>
<h2>Lab 1: Smooth Color Change</h2>
<button class="btn">Hover Me</button>
</body>
</html>
