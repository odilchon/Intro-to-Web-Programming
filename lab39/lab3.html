<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lab 3</title>
</head>
<body>
<script>
function runCounter() {
    let value = 1;

    let timerId = setInterval(() => {
        console.log("Counter value: " + value);

        if (value === 5) {
            clearInterval(timerId);
        }

        value++;
    }, 1000);
}

runCounter();
</script>
</body>
</html>
